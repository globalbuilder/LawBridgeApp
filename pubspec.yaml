  image_picker: ^0.8.7

  # Localization
  intl: ^0.18.0

  # Theming or UI (Optional)
  google_fonts: ^4.0.3

  animations: ^2.0.7

  path: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0



flutter:


  uses-material-design: true

