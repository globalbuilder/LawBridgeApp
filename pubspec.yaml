name: law_bridge
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  # Basic Flutter packages
  cupertino_icons: ^1.0.5

  # State Management
  flutter_bloc: ^8.1.2
  equatable: ^2.0.5
  provider: ^6.0.5   

  # Networking
  http: ^0.13.6       

  # Local Storage
  shared_preferences: ^2.0.17
